<!DOCTYPE html>
<html>
<head>
    <title>Day Finder</title>
</head>
<body>

<input type="number" id="dayInput" placeholder="Enter number (1-7)">
<button onclick="getDay()">Check Day</button>

<p id="result"></p>

<script>
function getDay() {
    let day = parseInt(document.getElementById("dayInput").value);
    let result;

    switch(day) {
        case 1: result = "Monday"; break;
        case 2: result = "Tuesday"; break;
        case 3: result = "Wednesday"; break;
        case 4: result = "Thursday"; break;
        case 5: result = "Friday"; break;
        case 6: result = "Saturday"; break;
        case 7: result = "Sunday"; break;
        default: result = "Please enter a number between 1 and 7.";
    }

    document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
